basePath: /
definitions:
  handler.shortenInputBody:
    properties:
      exp:
        minimum: 300
        type: integer
      url:
        type: string
    required:
    - exp
    - url
    type: object
  model.HealthCheckResponse:
    properties:
      instance_id:
        type: string
      message:
        type: string
      service_name:
        type: string
    type: object
  model.User:
    properties:
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  user.registerInputBody:
    properties:
      display_name:
        type: string
      email:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - display_name
    - email
    - password
    - username
    type: object
  user.registerResponse:
    properties:
      data:
        $ref: '#/definitions/model.User'
      message:
        type: string
    type: object
info:
  contact: {}
  description: API Swagger for Bookmark-Management.
  title: Bookmark Management API
  version: 4.0.0
paths:
  /genpass:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.HealthCheckResponse'
      summary: Generate a random password
      tags:
      - password
  /health-check:
    get:
      description: Trả về trạng thái hoạt động hiện tại, tên dịch vụ và instance ID
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.HealthCheckResponse'
        "500":
          description: Lỗi hệ thống nội bộ
          schema:
            additionalProperties:
              type: string
            type: object
      summary: System health-check
      tags:
      - health-check
  /v1/links/redirect/{code}:
    get:
      consumes:
      - application/json
      parameters:
      - description: Shorten code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Found
      tags:
      - link
  /v1/links/shorten:
    post:
      consumes:
      - application/json
      description: Generate shorten url based on original url that last upto 7 days
      parameters:
      - description: Input required
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handler.shortenInputBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      tags:
      - link
  /v1/users/register:
    post:
      consumes:
      - application/json
      description: Register a new user with the provided information
      parameters:
      - description: User registration details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user.registerInputBody'
      produces:
      - application/json
      responses:
        "200":
          description: Register an user successfully!
          schema:
            $ref: '#/definitions/user.registerResponse'
      summary: Register a new user
      tags:
      - User
swagger: "2.0"
