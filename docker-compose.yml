version: '3.7'

services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"

  bookmark_service:
    image: bookmark-service-test:latest
    build: .
    container_name: bookmark-service
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      redis:
       condition: service_started
      postgres:
       condition: service_healthy

  postgres:
    image: postgres:17
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:  ${DB_USER}
      POSTGRES_PASSWORD:  ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d bookmark" ]
      interval: 5s
      timeout: 5s
      retries: 5



